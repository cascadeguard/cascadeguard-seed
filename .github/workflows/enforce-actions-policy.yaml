# CascadeGuard — Reusable GitHub Actions Policy Enforcement Workflow
#
# Audits all workflow files in .github/workflows/ against an
# .cascadeguard/actions-policy.yaml policy file using the
# `cascadeguard actions audit` CLI command.
#
# Usage in a caller workflow:
#
#   jobs:
#     policy:
#       uses: cascadeguard/cascadeguard-open-secure-images/.github/workflows/enforce-actions-policy.yaml@main
#       with:
#         policy_path: .cascadeguard/actions-policy.yaml   # optional
#         workflows_dir: .github/workflows                  # optional
#         cascadeguard_version: latest                      # optional
#
# The job fails (non-zero exit) if any workflow uses an action that violates
# the policy. Violation details are printed to the job log.

name: Enforce Actions Policy

on:
  workflow_call:
    inputs:
      policy_path:
        description: "Path to the actions-policy.yaml file"
        required: false
        default: ".cascadeguard/actions-policy.yaml"
        type: string
      workflows_dir:
        description: "Path to the directory containing workflow files to audit"
        required: false
        default: ".github/workflows"
        type: string
      cascadeguard_version:
        description: "cascadeguard PyPI version to install (e.g. '1.2.3' or 'latest')"
        required: false
        default: "latest"
        type: string

jobs:
  audit:
    name: Audit Actions Policy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install CascadeGuard
        run: |
          if [ "${{ inputs.cascadeguard_version }}" = "latest" ]; then
            pip install --quiet cascadeguard
          else
            pip install --quiet "cascadeguard==${{ inputs.cascadeguard_version }}"
          fi

      - name: Audit GitHub Actions policy
        run: |
          cascadeguard actions audit \
            --policy "${{ inputs.policy_path }}" \
            --workflows-dir "${{ inputs.workflows_dir }}"
