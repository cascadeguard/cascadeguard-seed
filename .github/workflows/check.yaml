# Daily image check — discover base images, check registries for drift
name: Check Images

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run CascadeGuard check
        id: check
        uses: cascadeguard/cascadeguard-actions/check@main

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check.outputs.has-drift }}" = "true" ]; then
            echo "::warning::Base image drift detected — state files updated"
          else
            echo "All base images up to date"
          fi
