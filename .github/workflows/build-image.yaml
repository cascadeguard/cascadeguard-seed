# CascadeGuard — Build Image (Thin Wrapper)
#
# Delegates to the reusable build-image workflow in cascadeguard-actions.
# Kept locally so other local workflows can call it via ./.github/workflows/.

name: Build Image

on:
  workflow_call:
    inputs:
      image_path:
        description: "Path under images/ (e.g., python/3.12)"
        required: true
        type: string
      image_name:
        description: "Image name in registry (e.g., python)"
        required: true
        type: string
      image_tag:
        description: "Image tag (e.g., 3.12-slim)"
        required: true
        type: string
      push_and_sign:
        description: "Whether to push and sign the image (false on PRs)"
        required: false
        type: boolean
        default: false

jobs:
  build:
    uses: cascadeguard/cascadeguard-actions/.github/workflows/build-image.yaml@main
    with:
      image_path: ${{ inputs.image_path }}
      image_name: ${{ inputs.image_name }}
      image_tag: ${{ inputs.image_tag }}
      push_and_sign: ${{ inputs.push_and_sign }}
    secrets: inherit
