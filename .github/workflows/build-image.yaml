# CascadeGuard — Build, Scan, Test, Sign, and Push Hardened Images
#
# Reusable workflow called by ci.yaml for each image in images.yaml.
# All pipeline inputs come from the caller — no hardcoded image references here.

name: Build Image

on:
  workflow_call:
    inputs:
      image_path:
        description: "Path under images/ (e.g., python/3.12)"
        required: true
        type: string
      image_name:
        description: "Image name in registry (e.g., python)"
        required: true
        type: string
      image_tag:
        description: "Image tag (e.g., 3.12-slim)"
        required: true
        type: string
      push_and_sign:
        description: "Whether to push and sign the image (false on PRs)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write        # Required for cosign keyless signing via OIDC
  security-events: write # Required for SARIF upload
  attestations: write    # Required for SLSA provenance attestation

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        if: inputs.push_and_sign
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set full image reference
        id: meta
        run: |
          FULL_IMAGE="${{ env.IMAGE_PREFIX }}/${{ inputs.image_name }}:${{ inputs.image_tag }}"
          echo "full_image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Copy shared hardening scripts into build context
        run: cp -r shared images/${{ inputs.image_path }}/shared

      - name: Build image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: images/${{ inputs.image_path }}
          file: images/${{ inputs.image_path }}/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.full_image }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Scanning ─────────────────────────────────────────────────
      - name: Install Grype
        uses: cascadeguard/cascadeguard-actions/setup-grype@7e39ae312b916fb978e8b5f51aab113ae1aebca0 # CAS-94
        with:
          version: v0.110.0

      # Run Grype once and write both SARIF (for GitHub Security tab) and JSON
      # (for policy evaluation). We do NOT pass --fail-on here — the policy gate
      # comes later so that structure tests and SBOM generation always complete.
      - name: Scan image with Grype
        run: |
          grype "${{ steps.meta.outputs.full_image }}" \
            --config shared/scanning/grype-config.yaml \
            --output sarif=grype-results.sarif \
            --output json=grype-results.json

      # category is required when uploading from a matrix workflow — without it
      # every job uploads to the same default category and GitHub Code Scanning
      # reports "N configurations not found" because it can't distinguish them.
      - name: Upload Grype SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: grype-results.sarif
          category: grype-${{ inputs.image_name }}
        continue-on-error: true

      # ── Trivy (secondary scanner) ────────────────────────────────
      # Grype is the primary scanner and drives the CVE policy gate below.
      # Trivy provides a cross-check using a different database; its results
      # are uploaded as an artifact for comparison but do not gate the build.
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          image-ref: ${{ steps.meta.outputs.full_image }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"
        continue-on-error: true

      - name: Upload Trivy results artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: trivy-${{ inputs.image_name }}-${{ inputs.image_tag }}
          path: trivy-results.json
          retention-days: 30

      # ── Structure Tests ──────────────────────────────────────────
      - name: Install container-structure-test
        run: |
          curl -LO https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

      - name: Run container structure tests
        run: |
          container-structure-test test \
            --image "${{ steps.meta.outputs.full_image }}" \
            --config images/${{ inputs.image_path }}/test/structure.yaml

      # ── SBOM Generation ──────────────────────────────────────────
      - name: Install Syft
        uses: cascadeguard/cascadeguard-actions/setup-syft@7e39ae312b916fb978e8b5f51aab113ae1aebca0 # CAS-94
        with:
          version: v1.42.3

      - name: Generate SBOM
        run: |
          syft "${{ steps.meta.outputs.full_image }}" \
            --output spdx-json=sbom.spdx.json \
            --output cyclonedx-json=sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom-${{ inputs.image_name }}-${{ inputs.image_tag }}
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json

      # ── CVE Policy Gate ──────────────────────────────────────────
      # Evaluated after structure tests and SBOM so those artifacts are always
      # collected even when a policy violation is found.
      # Blocks on critical CVEs. High CVEs from upstream bases emit a warning.
      - name: Evaluate CVE policy
        run: |
          CRITICAL=$(jq '[.matches[] | select(.vulnerability.severity == "Critical")] | length' grype-results.json)
          HIGH=$(jq '[.matches[] | select(.vulnerability.severity == "High")] | length' grype-results.json)
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::CVE policy violation: $CRITICAL critical vulnerabilities found"
            exit 1
          fi
          if [ "$HIGH" -gt 0 ]; then
            echo "::warning::$HIGH high vulnerabilities found in upstream base image"
          fi
          echo "CVE policy check passed."

      # ── Sign & Push ──────────────────────────────────────────────
      - name: Install Cosign
        if: inputs.push_and_sign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Push image
        id: push
        if: inputs.push_and_sign
        run: |
          docker push "${{ steps.meta.outputs.full_image }}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.meta.outputs.full_image }}" | cut -d@ -f2)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Sign image and attach SBOM attestation
        if: inputs.push_and_sign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${{ steps.meta.outputs.full_image }}"

          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${{ steps.meta.outputs.full_image }}"

          cosign attach sbom \
            --sbom sbom.spdx.json \
            --type spdx \
            "${{ steps.meta.outputs.full_image }}"

      - name: Generate SLSA provenance attestation
        if: inputs.push_and_sign
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}/${{ inputs.image_name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # ── Cleanup ──────────────────────────────────────────────────
      - name: Clean up build context
        if: always()
        run: rm -rf images/${{ inputs.image_path }}/shared
