# CascadeGuard — PR Check Workflow
#
# Lightweight validation for pull requests. Runs CascadeGuard validate
# (images.yaml schema/config checks) and actions policy enforcement.
# Does NOT build images — that happens on push to main via build.yaml.

name: PR Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── CascadeGuard Validation ──────────────────────────────────────
  validate:
    name: Validate images.yaml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up CascadeGuard CLI
        uses: cascadeguard/cascadeguard-actions/setup-cascadeguard@7bd7df2e249f145a3b6e91d0bea84c7a00add902 # main
      - name: CascadeGuard validate
        run: cascadeguard images validate

  # ── Actions Policy Enforcement ───────────────────────────────────
  policy:
    uses: cascadeguard/cascadeguard-actions/.github/workflows/enforce-actions-policy.yaml@7bd7df2e249f145a3b6e91d0bea84c7a00add902 # main
