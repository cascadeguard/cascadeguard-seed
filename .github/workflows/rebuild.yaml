# CascadeGuard — Platform-Triggered Rebuild Workflow
#
# Triggered by POST /api/images/:image_id/rebuild on the CascadeGuard platform,
# which fires a GitHub repository_dispatch event with event_type "rebuild-image".
#
# client_payload fields:
#   image_name       — matches the `image` field in images.yaml (e.g. "python")
#   image_tag        — image tag (e.g. "3.12-slim")
#   trigger          — reason for rebuild (upstream_change | cve_detected | sla_breach | manual | scheduled)
#   reason           — optional human-readable description
#   rebuild_event_id — UUID of the rebuild_events record in the platform DB
#
# The workflow locates the image in images.yaml, then calls the reusable
# build-image.yaml pipeline to build, scan, test, sign, and push the image.

name: Platform Rebuild

on:
  repository_dispatch:
    types: [rebuild-image]

permissions:
  contents: read
  packages: write
  id-token: write        # cosign keyless signing via OIDC
  security-events: write # SARIF upload
  attestations: write    # SLSA provenance

jobs:
  # ── Resolve image from images.yaml ──────────────────────────────────────────
  resolve:
    runs-on: ubuntu-latest
    outputs:
      image_path: ${{ steps.resolve.outputs.image_path }}
      image_name: ${{ steps.resolve.outputs.image_name }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      found: ${{ steps.resolve.outputs.found }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve image from images.yaml
        id: resolve
        uses: cascadeguard/cascadeguard-actions/resolve-image@edd3aaab8a98b49b5b4fbddf0e9415bb15d4fbb8 # main
        with:
          image-name: ${{ github.event.client_payload.image_name }}
          image-tag: ${{ github.event.client_payload.image_tag }}

      - name: Log rebuild context
        run: |
          echo "Rebuild triggered by platform"
          echo "  image:             ${{ github.event.client_payload.image_name }}:${{ github.event.client_payload.image_tag }}"
          echo "  trigger:           ${{ github.event.client_payload.trigger }}"
          echo "  reason:            ${{ github.event.client_payload.reason }}"
          echo "  rebuild_event_id:  ${{ github.event.client_payload.rebuild_event_id }}"

  # ── Build, scan, sign, push ──────────────────────────────────────────────────
  build:
    needs: [resolve]
    if: needs.resolve.outputs.found == 'true'
    uses: ./.github/workflows/build-image.yaml
    with:
      image_path: ${{ needs.resolve.outputs.image_path }}
      image_name: ${{ needs.resolve.outputs.image_name }}
      image_tag: ${{ needs.resolve.outputs.image_tag }}
      push_and_sign: true
    secrets: inherit
