# CascadeGuard — CI Workflow
#
# Reads images.yaml to dynamically build the matrix of images to process.
# Adding a new image to images.yaml is the only change needed to enroll it
# in the full build/scan/sign pipeline.

name: CI

on:
  push:
    branches: [main]
    paths:
      - ".cascadeguard/**"
      - ".github/workflows/ci.yaml"
      - ".github/workflows/build-image.yaml"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_filter:
        description: "Limit to a specific image name (e.g., python). Leave empty for all."
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  id-token: write        # Required for cosign keyless signing via OIDC
  security-events: write # Required for SARIF upload
  attestations: write    # Required for SLSA provenance attestation

jobs:
  # ── Matrix Generation ────────────────────────────────────────────
  # Parses images.yaml at runtime so the pipeline is always in sync with
  # the manifest. No hardcoded image lists anywhere in this file.
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate image matrix from images.yaml
        id: matrix
        run: |
          python3 - <<'PYEOF'
          import yaml, json, os

          with open('images.yaml') as f:
              images = yaml.safe_load(f)

          filter_name = os.environ.get('IMAGE_FILTER', '').strip()

          active = [img for img in images if img.get('enabled', True) is not False]
          include = []
          for img in active:
              # Derive image_path from dockerfile path:
              # "images/python/3.12/Dockerfile" -> "python/3.12"
              parts = img['dockerfile'].split('/')
              image_path = '/'.join(parts[1:-1])
              if not filter_name or img['image'] == filter_name:
                  include.append({
                      'image_path': image_path,
                      'image_name': img['image'],
                      'image_tag': img['tag'],
                  })

          matrix = json.dumps({'include': include})
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'matrix={matrix}\n')
          print(f'Generated matrix with {len(include)} image(s): {[e["image_name"] for e in include]}')
          PYEOF
        env:
          IMAGE_FILTER: ${{ github.event.inputs.image_filter }}

  # ── CascadeGuard Validation ──────────────────────────────────────
  # Dogfoods the CascadeGuard tool — lints images.yaml and performs a
  # dry-run state generation to catch misconfigured Dockerfiles early.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: CascadeGuard validate
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ghcr.io/cascadeguard/cascadeguard:v0.1.0 \
            validate \
          || echo "::warning::CascadeGuard validate exited non-zero — review images.yaml or check CascadeGuard version compatibility"

  # ── Per-Image Build Pipeline ─────────────────────────────────────
  # Each matrix entry calls the reusable build-image.yaml workflow.
  # push_and_sign is true only on pushes to main (not PRs).
  build:
    needs: [generate-matrix, validate]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    uses: ./.github/workflows/build-image.yaml
    with:
      image_path: ${{ matrix.image_path }}
      image_name: ${{ matrix.image_name }}
      image_tag: ${{ matrix.image_tag }}
      push_and_sign: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  # ── Actions Policy Enforcement ───────────────────────────────────
  # Validates every workflow file against .cascadeguard/actions-policy.yaml.
  # All external actions must be explicitly allowed — no unknown actions slip in.
  policy:
    uses: ./.github/workflows/enforce-actions-policy.yaml

  # ── Build Gate ───────────────────────────────────────────────────
  # Aggregates all matrix build results into a single required status check.
  # Require THIS job (not the matrix entries) in branch protection so that
  # every image's build/scan/sign pipeline must pass before a PR can merge.
  build-gate:
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    steps:
      - name: Check all builds passed
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "::error::One or more image builds failed. Check the build job logs above."
            exit 1
          fi
          echo "All image builds passed the security gate."
