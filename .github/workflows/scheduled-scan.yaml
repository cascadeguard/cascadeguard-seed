# CascadeGuard — Scheduled Vulnerability Scan (Thin Wrapper)
#
# Delegates daily vulnerability scanning to the reusable workflow in
# cascadeguard-actions. All scan orchestration — matrix generation,
# per-image Grype/Trivy scanning, report collection, and commit — is
# handled by the shared workflow. This file only provides the schedule
# trigger and repo-specific inputs.

name: Scheduled Vulnerability Scan

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: read
  issues: write
  security-events: write

jobs:
  scan:
    uses: cascadeguard/cascadeguard-actions/.github/workflows/scheduled-scan.yaml@main
    with:
      image-prefix: ghcr.io/${{ github.repository_owner }}
      grype-config: shared/scanning/grype-config.yaml
    secrets: inherit
