# CascadeGuard image manifest
#
# Single source of truth for images tracked by CascadeGuard.
# Adding an image here enrols it in the check and build pipelines.
#
# Required fields: name, image, tag, registry, source.dockerfile
#
# Source fields:
#   source:
#     dockerfile: images/my-image/Dockerfile   # path to Dockerfile
#     repo: org/repo                           # set for remote sources
#     branch: main                             # remote branch (default: main)
#
# Build fields (optional):
#   build:
#     enabled: true       # default; set false to check-only
#
# Images with build.enabled: false are checked for tag drift and
# CVEs but not built.

- name: seed
  image: seed
  tag: latest
  registry: ghcr.io/cascadeguard
  source:
    dockerfile: local/seed/Dockerfile
